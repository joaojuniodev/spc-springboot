server:
  port: 8080
spring:
  datasource:
    url: jdbc:mysql://localhost:3306/spc?useTimezone=true&serverTimezone=UTC
    username: developer
    password: 1234567
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
