<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inscrições - Semana Acadêmica</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.2/jspdf.plugin.autotable.min.js"></script>
    <link rel="stylesheet" href="./styles.css">
</head>
<body class="text-gray-800">
    <div class="container mx-auto max-w-4xl p-4 md:p-8">
        <header class="mb-8 flex flex-col items-center justify-between rounded-xl bg-white p-6 shadow-md sm:flex-row">
            <h1 class="mb-4 text-3xl font-bold text-gray-900 sm:mb-0">Inscrições - Semana Acadêmica</h1>

            <div id="auth-container" class="flex items-center space-x-4">
                <div id="user-info" class="hidden text-right">
                    <p id="user-name" class="font-semibold text-gray-700"></p>
                    <p id="user-email" class="text-sm text-gray-500"></p>
                </div>

                <button
                    id="delete-my-registrations-button"
                    class="hidden rounded-lg bg-red-600 px-6 py-2 font-semibold text-white shadow-sm transition duration-300 hover:bg-red-700"
                >
                    Excluir Minhas Inscrições
                </button>

                <button
                    id="auth-button"
                    class="rounded-lg bg-blue-600 px-6 py-2 font-semibold text-white shadow-sm transition duration-300 hover:bg-blue-700"
                >
                    Login com Google
                </button>
            </div>
        </header>

        <section class="mb-6 rounded-xl bg-white p-4 shadow-md">
            <h2 class="mb-3 text-lg font-semibold text-gray-800">Selecione seu período:</h2>

            <div class="flex flex-wrap gap-3">
                <button
                    id="filter-integral"
                    class="periodo-filter-btn rounded-lg border-2 border-blue-300 bg-blue-100 px-5 py-2 font-semibold text-blue-800"
                >
                    Período Integral
                </button>

                <button
                    id="filter-noturno"
                    class="periodo-filter-btn rounded-lg border-2 border-indigo-300 bg-indigo-100 px-5 py-2 font-semibold text-indigo-800"
                >
                    Período Noturno
                </button>
            </div>
        </section>

        <div id="main-content" class="hidden">
            <nav id="tabs-container" class="text-light mb-6 flex flex-wrap gap-2 border-b border-gray-200 pb-3">
                <button data-day="1" class="tab-btn active rounded-lg border-2 border-transparent px-5 py-2 font-semibold">Feira de Profissões(08/09)</button>
                <button data-day="2" class="tab-btn rounded-lg border-2 border-transparent px-5 py-2 font-semibold">Palestras (09/09)</button>
                <button data-day="3" class="tab-btn noturno-only hidden rounded-lg border-2 border-transparent px-5 py-2 font-semibold">Oficinas (10/09)</button>
                <button data-day="4" class="tab-btn rounded-lg border-2 border-transparent px-5 py-2 font-semibold">Palestras (11/09)</button>
                <button data-day="5" class="tab-btn integral-only hidden rounded-lg border-2 border-transparent px-5 py-2 font-semibold">Oficinas (12/09)</button>
            </nav>

            <main id="lectures-by-day-container">
                <div class="flex h-40 items-center justify-center">
                    <div class="loader"></div>
                    <p class="ml-4 text-gray-600">Carregando palestras...</p>
                </div>
            </main>
        </div>

        <footer class="mt-12 text-center text-gray-500">
            <p>&copy; 2025 Semana Acadêmica. Todos os direitos reservados.</p>
        </footer>
    </div>

    <script type="module" src="./app.js"></script>
</body>
</html>
